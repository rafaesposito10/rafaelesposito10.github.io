<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botpress Embed</title>
    <style>
      /* Estilos padrão (Modo Escuro) */
      body {
        background-color: #333;
        color: #fff;
        transition:
          background-color 0.3s,
          color 0.3s;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
      }

      /* Contêiner para os botões fixos */
      .fixed-buttons {
        position: fixed;
        top: 20px;
        left: 20px; /* Alinhado à esquerda */
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 1000; /* Assegura que os botões fiquem sobre outros elementos */
      }

      /* Estilos para os botões de alternância e limpeza */
      .fixed-buttons button {
        background-color: #444;
        border: none;
        color: #fff;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 5px;
        transition:
          background-color 0.3s,
          color 0.3s;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .fixed-buttons button:hover {
        background-color: #555;
      }

      /* Modo Claro */
      body.light-mode {
        background-color: #f0f0f0;
        color: #000;
      }

      .light-mode .fixed-buttons button {
        background-color: #ddd;
        color: #000;
      }

      .light-mode .fixed-buttons button:hover {
        background-color: #ccc;
      }

      /* Ícones nos botões */
      .button-icon {
        margin-right: 8px;
        font-size: 16px;
      }

      .user-switcher {
        background: rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 260px;
      }

      .user-switcher label {
        font-size: 12px;
      }

      .user-switcher input {
        border: 1px solid #555;
        background-color: #222;
        color: #fff;
        border-radius: 5px;
        padding: 8px;
        font-size: 13px;
      }

      .user-switcher select {
        border: 1px solid #555;
        background-color: #222;
        color: #fff;
        border-radius: 5px;
        padding: 8px;
        font-size: 13px;
      }

      .user-switcher input::placeholder {
        color: #aaa;
      }

      .user-switcher .switch-user-button {
        width: 100%;
      }

      .user-status {
        font-size: 12px;
        color: #ddd;
      }

      .light-mode .user-switcher {
        background: rgba(255, 255, 255, 0.85);
      }

      .light-mode .user-switcher input {
        border-color: #bbb;
        background-color: #fff;
        color: #000;
      }

      .light-mode .user-switcher select {
        border-color: #bbb;
        background-color: #fff;
        color: #000;
      }

      .light-mode .user-switcher input::placeholder {
        color: #777;
      }

      .light-mode .user-status {
        color: #333;
      }
    </style>
  </head>
  <body>
    <!-- Contêiner para os Botões Fixos -->
    <div class="fixed-buttons">
      <!-- Botão de Alternância de Tema -->
      <button class="toggle-button" id="theme-toggle">
        <span class="button-icon">🌙</span>Modo Escuro
      </button>

      <div class="user-switcher">
        <label for="fixed-users">Usuários fixos</label>
        <select id="fixed-users">
          <option value="">Selecione um usuário</option>
          <option
            value='{"id":"732213","email":"rafael.esposito@eduzz.com.br"}'
          >
            732213 - rafael.esposito@eduzz.com.br
          </option>
          <option
            value='{"id":"21708962","email":"lucas.souza@eduzz.com.br"}'
          >
            21708962 - lucas.souza@eduzz.com.br
          </option>
        </select>

        <label for="client-id">ID do cliente</label>
        <input id="client-id" type="text" placeholder="ex: cliente_123" />

        <label for="client-email">Email do cliente</label>
        <input
          id="client-email"
          type="email"
          placeholder="cliente@exemplo.com"
        />

        <button class="switch-user-button" id="switch-user-btn">
          Trocar usuário
        </button>
        <div class="user-status" id="user-status">Aguardando webchat...</div>
      </div>
    </div>

    <!-- Seu conteúdo existente -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/07/25/16/20250725163424-LLGP1S04.js"></script>
    <script>
      const clientIdInput = document.getElementById("client-id");
      const clientEmailInput = document.getElementById("client-email");
      const fixedUsersSelect = document.getElementById("fixed-users");
      const switchUserBtn = document.getElementById("switch-user-btn");
      const userStatus = document.getElementById("user-status");
      const STORAGE_KEY = "bp-selected-user";
      let webchatInitialized = false;

      const savedUser = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      clientIdInput.value = savedUser.id || "";
      clientEmailInput.value = savedUser.email || "";

      function sincronizarDropdownComUsuario(id, email) {
        const option = Array.from(fixedUsersSelect.options).find((item) => {
          if (!item.value) {
            return false;
          }

          try {
            const parsed = JSON.parse(item.value);
            return parsed.id === id && parsed.email === email;
          } catch {
            return false;
          }
        });

        fixedUsersSelect.value = option ? option.value : "";
      }

      sincronizarDropdownComUsuario(savedUser.id || "", savedUser.email || "");

      function setStatus(text) {
        userStatus.textContent = text;
      }

      async function aplicarUsuario(id, email) {
        if (typeof window.botpress.setUser === "function") {
          await window.botpress.setUser({
            id,
            data: { email },
          });
          return;
        }

        await window.botpress.updateUser({
          data: {
            externalId: id,
            email,
          },
        });
      }

      async function trocarUsuario() {
        const id = clientIdInput.value.trim();
        const email = clientEmailInput.value.trim();

        if (!id || !email) {
          setStatus("Preencha ID e email.");
          return;
        }

        if (!webchatInitialized) {
          setStatus("Webchat ainda não inicializou.");
          return;
        }

        setStatus("Trocando usuário...");

        try {
          await aplicarUsuario(id, email);
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ id, email }));
          setStatus(`Usuário ativo: ${id}`);
        } catch (error) {
          console.error(error);
          setStatus("Erro ao trocar usuário.");
        }
      }

      window.botpress.on("webchat:initialized", async () => {
        webchatInitialized = true;
        setStatus("Webchat pronto.");

        if (savedUser.id && savedUser.email) {
          try {
            await aplicarUsuario(savedUser.id, savedUser.email);
            setStatus(`Usuário ativo: ${savedUser.id}`);
          } catch (error) {
            console.error(error);
            setStatus("Erro ao restaurar usuário salvo.");
          }
        }
      });

      switchUserBtn.addEventListener("click", trocarUsuario);

      fixedUsersSelect.addEventListener("change", () => {
        if (!fixedUsersSelect.value) {
          return;
        }

        try {
          const selectedUser = JSON.parse(fixedUsersSelect.value);
          clientIdInput.value = selectedUser.id;
          clientEmailInput.value = selectedUser.email;
          setStatus(`Usuário selecionado: ${selectedUser.id}`);
        } catch (error) {
          console.error(error);
          setStatus("Erro ao selecionar usuário fixo.");
        }
      });
    </script>
    <script>
      // Seleção dos elementos
      const toggleButton = document.getElementById("theme-toggle");
      const bodyElement = document.body;

      // Função para atualizar o texto do botão de tema
      function updateThemeButton() {
        if (bodyElement.classList.contains("light-mode")) {
          toggleButton.innerHTML =
            '<span class="button-icon">🌙</span>Modo Escuro';
        } else {
          toggleButton.innerHTML =
            '<span class="button-icon">☀️</span>Modo Claro';
        }
      }

      // Verificar preferência salva no localStorage
      if (localStorage.getItem("theme") === "light") {
        bodyElement.classList.add("light-mode");
      }

      updateThemeButton();

      // Evento de clique para alternar o tema
      toggleButton.addEventListener("click", () => {
        bodyElement.classList.toggle("light-mode");
        // Salvar preferência no localStorage
        if (bodyElement.classList.contains("light-mode")) {
          localStorage.setItem("theme", "light");
        } else {
          localStorage.setItem("theme", "dark");
        }
        updateThemeButton();
      });
    </script>
  </body>
</html>
