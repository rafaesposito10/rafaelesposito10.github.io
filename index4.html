<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botpress Embed</title>
    <style>
      /* Estilos padrão (Modo Escuro) */
      body {
        background-color: #333;
        color: #fff;
        transition:
          background-color 0.3s,
          color 0.3s;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
      }

      /* Contêiner para os botões fixos */
      .fixed-buttons {
        position: fixed;
        top: 20px;
        left: 20px; /* Alinhado à esquerda */
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 1000; /* Assegura que os botões fiquem sobre outros elementos */
      }

      /* Estilos para os botões de alternância e limpeza */
      .fixed-buttons button {
        background-color: #444;
        border: none;
        color: #fff;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 5px;
        transition:
          background-color 0.3s,
          color 0.3s;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .fixed-buttons button:hover {
        background-color: #555;
      }

      /* Modo Claro */
      body.light-mode {
        background-color: #f0f0f0;
        color: #000;
      }

      .light-mode .fixed-buttons button {
        background-color: #ddd;
        color: #000;
      }

      .light-mode .fixed-buttons button:hover {
        background-color: #ccc;
      }

      /* Ícones nos botões */
      .button-icon {
        margin-right: 8px;
        font-size: 16px;
      }

      .user-switcher {
        background: rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 260px;
      }

      .user-switcher label {
        font-size: 12px;
      }

      .user-switcher input {
        border: 1px solid #555;
        background-color: #222;
        color: #fff;
        border-radius: 5px;
        padding: 8px;
        font-size: 13px;
      }

      .user-switcher select {
        border: 1px solid #555;
        background-color: #222;
        color: #fff;
        border-radius: 5px;
        padding: 8px;
        font-size: 13px;
      }

      .user-switcher input::placeholder {
        color: #aaa;
      }

      .user-switcher .switch-user-button {
        width: 100%;
      }

      .user-status {
        font-size: 12px;
        color: #ddd;
      }

      .light-mode .user-switcher {
        background: rgba(255, 255, 255, 0.85);
      }

      .light-mode .user-switcher input {
        border-color: #bbb;
        background-color: #fff;
        color: #000;
      }

      .light-mode .user-switcher select {
        border-color: #bbb;
        background-color: #fff;
        color: #000;
      }

      .light-mode .user-switcher input::placeholder {
        color: #777;
      }

      .light-mode .user-status {
        color: #333;
      }

      .bpFabWrapper,
      .bpWebchat {
        transition:
          filter 0.3s,
          background-color 0.3s,
          color 0.3s;
      }

      body:not(.light-mode) .bpWebchat {
        color-scheme: dark;
      }

      body.light-mode .bpWebchat {
        color-scheme: light;
      }

      body:not(.light-mode) .bpWebchat,
      body:not(.light-mode) .bpHeaderContainer,
      body:not(.light-mode) .bpComposer,
      body:not(.light-mode) .bpMessageList {
        background-color: #1f1f1f !important;
        color: #f5f5f5 !important;
      }

      body.light-mode .bpWebchat,
      body.light-mode .bpHeaderContainer,
      body.light-mode .bpComposer,
      body.light-mode .bpMessageList {
        background-color: #fff !important;
        color: #111 !important;
      }
    </style>
  </head>
  <body>
    <!-- Contêiner para os Botões Fixos -->
    <div class="fixed-buttons">
      <!-- Botão de Alternância de Tema -->
      <button class="toggle-button" id="theme-toggle">
        <span class="button-icon">🌙</span>Modo Escuro
      </button>

      <div class="user-switcher">
        <label for="fixed-users">Usuários fixos</label>
        <select id="fixed-users">
          <option value="">Selecione um usuário</option>
          <option
            value='{"id":"732213","email":"rafael.esposito@eduzz.com.br"}'
          >
            732213 - rafael.esposito@eduzz.com.br
          </option>
          <option
            value='{"id":"21708962","email":"lucas.souza@eduzz.com.br"}'
          >
            21708962 - lucas.souza@eduzz.com.br
          </option>
        </select>

        <label for="client-id">ID do cliente</label>
        <input id="client-id" type="text" placeholder="ex: cliente_123" />

        <label for="client-email">Email do cliente</label>
        <input
          id="client-email"
          type="email"
          placeholder="cliente@exemplo.com"
        />

        <button class="switch-user-button" id="switch-user-btn">
          Trocar usuário
        </button>
        <div class="user-status" id="user-status">Aguardando webchat...</div>
      </div>
    </div>

    <!-- Seu conteúdo existente -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/07/25/16/20250725163424-LLGP1S04.js"></script>
    <script>
      const clientIdInput = document.getElementById("client-id");
      const clientEmailInput = document.getElementById("client-email");
      const fixedUsersSelect = document.getElementById("fixed-users");
      const switchUserBtn = document.getElementById("switch-user-btn");
      const userStatus = document.getElementById("user-status");
      const STORAGE_KEY = "app-selected-user";
      const PENDING_SWITCH_KEY = "app-pending-user-switch";
      const SNAPSHOT_PREFIX = "app-bp-snapshot:";
      let webchatInitialized = false;
      let webchatReady = false;

      const savedUser = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      clientIdInput.value = savedUser.id || "";
      clientEmailInput.value = savedUser.email || "";

      function isBotpressStorageKey(key) {
        if (!key || key.startsWith("app-")) {
          return false;
        }

        return /(botpress|bpcloud|bp-webchat|bp_webchat|^bp[:_-])/i.test(key);
      }

      function readBotpressStorageEntries() {
        const entries = {};

        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (!isBotpressStorageKey(key)) {
            continue;
          }

          entries[key] = localStorage.getItem(key);
        }

        return entries;
      }

      function clearBotpressStorageEntries() {
        const keysToRemove = [];

        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (isBotpressStorageKey(key)) {
            keysToRemove.push(key);
          }
        }

        keysToRemove.forEach((key) => localStorage.removeItem(key));
      }

      function saveSnapshotForUser(userId) {
        if (!userId) {
          return;
        }

        const entries = readBotpressStorageEntries();
        localStorage.setItem(`${SNAPSHOT_PREFIX}${userId}`, JSON.stringify(entries));
      }

      function restoreSnapshotForUser(userId) {
        clearBotpressStorageEntries();

        const snapshotRaw = localStorage.getItem(`${SNAPSHOT_PREFIX}${userId}`);
        if (!snapshotRaw) {
          return false;
        }

        try {
          const snapshot = JSON.parse(snapshotRaw);
          Object.entries(snapshot).forEach(([key, value]) => {
            if (typeof value === "string") {
              localStorage.setItem(key, value);
            }
          });
          return true;
        } catch (error) {
          console.error("[Botpress][Sessão] Snapshot inválido para usuário:", userId, error);
          return false;
        }
      }

      function sincronizarDropdownComUsuario(id, email) {
        const option = Array.from(fixedUsersSelect.options).find((item) => {
          if (!item.value) {
            return false;
          }

          try {
            const parsed = JSON.parse(item.value);
            return parsed.id === id && parsed.email === email;
          } catch {
            return false;
          }
        });

        fixedUsersSelect.value = option ? option.value : "";
      }

      sincronizarDropdownComUsuario(savedUser.id || "", savedUser.email || "");

      function setStatus(text) {
        userStatus.textContent = text;
      }

      async function sincronizarTemaBotpress() {
        const themeMode = document.body.classList.contains("light-mode")
          ? "light"
          : "dark";

        try {
          if (typeof window.botpress.config === "function") {
            window.botpress.config({
              configuration: {
                themeMode,
              },
            });
            return;
          }

          if (typeof window.botpress.setConfig === "function") {
            await window.botpress.setConfig({
              configuration: {
                themeMode,
              },
            });
          }
        } catch (error) {
          console.warn("Não foi possível sincronizar tema do Botpress:", error);
        }
      }

      window.sincronizarTemaBotpress = sincronizarTemaBotpress;

      async function aplicarUsuario(id, email) {
        if (typeof window.botpress.setUser === "function") {
          await window.botpress.setUser({
            id,
            data: { email },
          });
          return;
        }

        if (typeof window.botpress.config === "function") {
          window.botpress.config({
            user: {
              userKey: id,
              data: {
                externalId: id,
                email,
              },
            },
          });
          return;
        }

        await window.botpress.updateUser({
          userKey: id,
          data: {
            externalId: id,
            email,
          },
        });
      }

      async function trocarUsuario() {
        const id = clientIdInput.value.trim();
        const email = clientEmailInput.value.trim();

        if (!id || !email) {
          setStatus("Preencha ID e email.");
          return;
        }

        if (!webchatInitialized) {
          setStatus("Webchat ainda não inicializou.");
          return;
        }

        setStatus("Trocando usuário e recarregando chat...");

        try {
          if (typeof window.botpress.close === "function") {
            window.botpress.close();
            console.info("[Botpress][Sessão] Chat fechado antes da troca de usuário.");
          }

          const hasSetUser = typeof window.botpress.setUser === "function";
          let isSameUser = false;
          let currentId = "";
          let currentEmail = "";

          if (hasSetUser) {
            console.info(
              `[Botpress][Sessão] setUser disponível para o usuário ${id}. O Botpress decidirá entre retomar conversa existente ou criar nova.`
            );
          }

          if (!hasSetUser && typeof window.botpress.getUser === "function") {
            const currentUser = await window.botpress.getUser();
            currentId =
              currentUser?.data?.externalId ||
              currentUser?.userKey ||
              currentUser?.id ||
              "";
            currentEmail = currentUser?.data?.email || currentUser?.email || "";

            isSameUser = currentId === id && currentEmail === email;

            console.info(
              `[Botpress][Sessão] Fallback sem setUser. Usuário atual: ${currentId || "(vazio)"} | ${currentEmail || "(vazio)"}. Usuário solicitado: ${id} | ${email}. Decisão: ${isSameUser ? "manter sessão atual" : "trocar contexto do usuário e tentar retomar histórico existente"}.`
            );
          }

          if (!hasSetUser && !isSameUser) {
            if (currentId) {
              saveSnapshotForUser(currentId);
              console.info(
                `[Botpress][Sessão] Snapshot local salvo para usuário ${currentId}.`
              );
            }

            const restored = restoreSnapshotForUser(id);
            console.info(
              `[Botpress][Sessão] Snapshot ${restored ? "restaurado" : "não encontrado"} para usuário ${id}.`
            );

            localStorage.setItem(
              PENDING_SWITCH_KEY,
              JSON.stringify({ id, email, at: Date.now() })
            );
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ id, email }));

            setStatus(`Usuário ativo: ${id} (recarregando contexto...)`);
            console.info(
              `[Botpress][Sessão] Recarregando página para aplicar contexto do usuário ${id}.`
            );
            window.location.reload();
            return;
          }

          await aplicarUsuario(id, email);

          if (!hasSetUser && webchatReady && isSameUser) {
            console.info(
              `[Botpress][Sessão] Mantendo conversa atual para retomar sessão existente do usuário ${id}.`
            );
          } else if (!hasSetUser) {
            console.info(
              `[Botpress][Sessão] Aplicado userKey=${id}. Não foi feito restartConversation para evitar forçar nova sessão; o Botpress irá retomar histórico existente desse usuário ou criar uma sessão nova se não houver.`
            );
          }

          if (typeof window.botpress.open === "function") {
            window.botpress.open();
            console.info("[Botpress][Sessão] Chat reaberto após a troca de usuário.");
          }

          localStorage.setItem(STORAGE_KEY, JSON.stringify({ id, email }));
          setStatus(
            hasSetUser
              ? `Usuário ativo: ${id} (retomada automática ou nova)`
              : isSameUser
                ? `Usuário ativo: ${id} (sessão mantida)`
                : `Usuário ativo: ${id} (retomada automática ou nova)`
          );
        } catch (error) {
          console.error(error);
          setStatus("Erro ao trocar usuário.");
        }
      }

      window.botpress.on("webchat:initialized", async () => {
        webchatInitialized = true;
        setStatus("Webchat pronto.");

        const pendingSwitch = JSON.parse(
          localStorage.getItem(PENDING_SWITCH_KEY) || "null"
        );
        const userToApply =
          pendingSwitch && pendingSwitch.id && pendingSwitch.email
            ? pendingSwitch
            : savedUser;

        await sincronizarTemaBotpress();

        if (userToApply.id && userToApply.email) {
          try {
            await aplicarUsuario(userToApply.id, userToApply.email);
            localStorage.setItem(
              STORAGE_KEY,
              JSON.stringify({ id: userToApply.id, email: userToApply.email })
            );
            sincronizarDropdownComUsuario(userToApply.id, userToApply.email);
            clientIdInput.value = userToApply.id;
            clientEmailInput.value = userToApply.email;
            setStatus(`Usuário ativo: ${userToApply.id}`);

            if (pendingSwitch?.id) {
              console.info(
                `[Botpress][Sessão] Contexto do usuário ${pendingSwitch.id} aplicado após recarregamento.`
              );
              localStorage.removeItem(PENDING_SWITCH_KEY);
            }
          } catch (error) {
            console.error(error);
            setStatus("Erro ao restaurar usuário salvo.");
          }
        }
      });

      window.botpress.on("webchat:ready", () => {
        webchatReady = true;
      });

      switchUserBtn.addEventListener("click", trocarUsuario);

      fixedUsersSelect.addEventListener("change", () => {
        if (!fixedUsersSelect.value) {
          return;
        }

        try {
          const selectedUser = JSON.parse(fixedUsersSelect.value);
          clientIdInput.value = selectedUser.id;
          clientEmailInput.value = selectedUser.email;
          setStatus(`Usuário selecionado: ${selectedUser.id}`);
        } catch (error) {
          console.error(error);
          setStatus("Erro ao selecionar usuário fixo.");
        }
      });
    </script>
    <script>
      // Seleção dos elementos
      const toggleButton = document.getElementById("theme-toggle");
      const bodyElement = document.body;

      // Função para atualizar o texto do botão de tema
      function updateThemeButton() {
        if (bodyElement.classList.contains("light-mode")) {
          toggleButton.innerHTML =
            '<span class="button-icon">🌙</span>Modo Escuro';
        } else {
          toggleButton.innerHTML =
            '<span class="button-icon">☀️</span>Modo Claro';
        }
      }

      // Verificar preferência salva no localStorage
      if (localStorage.getItem("theme") === "light") {
        bodyElement.classList.add("light-mode");
      }

      updateThemeButton();

      // Evento de clique para alternar o tema
      toggleButton.addEventListener("click", () => {
        bodyElement.classList.toggle("light-mode");
        // Salvar preferência no localStorage
        if (bodyElement.classList.contains("light-mode")) {
          localStorage.setItem("theme", "light");
        } else {
          localStorage.setItem("theme", "dark");
        }
        updateThemeButton();

        if (typeof window.sincronizarTemaBotpress === "function") {
          window.sincronizarTemaBotpress();
        }
      });
    </script>
  </body>
</html>
